<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Events Diagram</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: #3498db;
            border-color: #3498db;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .btn-success {
            background: #27ae60;
            border-color: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
        }

        .size-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px 15px;
            border-radius: 8px;
        }

        .size-controls input {
            width: 80px;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
        }

        .chart-container {
            position: relative;
            overflow: auto;
            padding: 30px;
            min-height: 600px;
        }

        #chart {
            background: #f8f9fa;
            border-radius: 10px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .timeline-line {
            stroke: #3498db;
            stroke-width: 3;
            fill: none;
        }

        .event-point {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .event-point:hover {
            filter: brightness(1.2);
            transform: scale(1.3);
        }

        .event-cluster {
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }

        .cluster-circle {
            fill: #e74c3c;
            stroke: #c0392b;
            stroke-width: 2;
        }

        .time-label {
            font-size: 11px;
            fill: #7f8c8d;
            font-family: monospace;
        }

        .line-label {
            font-size: 13px;
            fill: #2c3e50;
            font-weight: 600;
        }

        .connection-line {
            stroke: #95a5a6;
            stroke-width: 1.5;
            stroke-dasharray: 5,5;
            fill: none;
            opacity: 0.6;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
            color: white;
            padding: 20px 25px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .modal-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 25px;
        }

        .data-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 4px solid #3498db;
        }

        .data-card h3 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .data-row:last-child {
            border-bottom: none;
        }

        .data-label {
            color: #7f8c8d;
            font-weight: 500;
        }

        .data-value {
            color: #2c3e50;
            font-weight: 600;
        }

        .event-tree {
            margin-top: 20px;
            padding: 15px;
            background: #ecf0f1;
            border-radius: 8px;
        }

        .event-tree h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .tree-item {
            padding: 8px 12px;
            background: white;
            border-radius: 5px;
            margin: 5px 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tree-item::before {
            content: "└─";
            color: #3498db;
            font-weight: bold;
        }

        .zoom-info {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #2c3e50;
        }

        .legend-color {
            width: 15px;
            height: 15px;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Timeline Events Diagram</h1>
            <div class="controls">
                <button class="btn btn-primary" onclick="addNewLine()">+ Добавить линию</button>
                <button class="btn btn-success" onclick="addRandomEvent()">+ Добавить событие</button>
                <button class="btn" onclick="resetZoom()">Сбросить зум</button>
                <div class="size-controls">
                    <label>Ширина:</label>
                    <input type="number" id="canvasWidth" value="1200" min="600" max="3000" step="100">
                    <button class="btn btn-primary" onclick="updateCanvasSize()">Применить</button>
                </div>
                <div class="size-controls">
                    <label>Высота:</label>
                    <input type="number" id="canvasHeight" value="600" min="400" max="2000" step="50">
                    <button class="btn btn-primary" onclick="updateCanvasSize()">Применить</button>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <svg id="chart"></svg>
        </div>

        <div style="padding: 0 30px 20px;">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #3498db;"></div>
                    <span>Линия времени</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71;"></div>
                    <span>Событие</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c;"></div>
                    <span>Кластер событий</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #95a5a6;"></div>
                    <span>Связь событий</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Детали события</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be dynamically inserted -->
            </div>
        </div>
    </div>

    <div class="zoom-info" id="zoomInfo">
        Масштаб: 100% | Событий: 0
    </div>

    <script>
        // Global variables
        let svg, g, zoom;
        let canvasWidth = 1200;
        let canvasHeight = 600;
        let currentZoom = 1;
        
        // Data structures
        let timelines = [];
        let events = [];
        let eventIdCounter = 0;

        // Color palette for timelines
        const colors = [
            '#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6',
            '#1abc9c', '#e67e22', '#34495e', '#16a085', '#c0392b'
        ];

        // Initialize the application
        function init() {
            createInitialData();
            renderChart();
            updateZoomInfo();
        }

        // Create initial sample data
        function createInitialData() {
            // Create timelines
            for (let i = 0; i < 3; i++) {
                timelines.push({
                    id: i,
                    name: `Линия ${i + 1}`,
                    y: 100 + i * 150,
                    color: colors[i]
                });
            }

            // Create sample events
            const now = new Date();
            for (let i = 0; i < 15; i++) {
                const timelineId = Math.floor(Math.random() * timelines.length);
                const timeOffset = Math.random() * 86400000 * 30; // 30 days range
                const eventTime = new Date(now.getTime() - timeOffset);
                
                events.push({
                    id: eventIdCounter++,
                    timelineId: timelineId,
                    parentId: null,
                    time: eventTime,
                    title: `Событие ${i + 1}`,
                    description: `Описание события ${i + 1}. Это пример подробного описания.`,
                    data: {
                        type: ['Тип A', 'Тип B', 'Тип C'][Math.floor(Math.random() * 3)],
                        priority: ['Низкий', 'Средний', 'Высокий'][Math.floor(Math.random() * 3)],
                        status: ['Активно', 'Завершено', 'В ожидании'][Math.floor(Math.random() * 3)],
                        value: Math.floor(Math.random() * 1000),
                        category: `Категория ${Math.floor(Math.random() * 5) + 1}`
                    }
                });
            }

            // Create some hierarchical events (events attached to other events)
            for (let i = 0; i < 5; i++) {
                if (events.length > i) {
                    const parentEvent = events[i];
                    const childTime = new Date(parentEvent.time.getTime() + Math.random() * 3600000); // Within 1 hour
                    
                    events.push({
                        id: eventIdCounter++,
                        timelineId: parentEvent.timelineId,
                        parentId: parentEvent.id,
                        time: childTime,
                        title: `Подсобытие ${i + 1}`,
                        description: `Это подсобытие привязано к "${parentEvent.title}"`,
                        data: {
                            type: 'Подсобытие',
                            priority: 'Средний',
                            status: 'Активно',
                            value: Math.floor(Math.random() * 500),
                            parentTitle: parentEvent.title
                        }
                    });
                }
            }
        }

        // Render the chart
        function renderChart() {
            // Clear existing SVG
            d3.select('#chart').html('');
            
            // Create SVG
            svg = d3.select('#chart')
                .attr('width', canvasWidth)
                .attr('height', canvasHeight)
                .attr('viewBox', `0 0 ${canvasWidth} ${canvasHeight}`);

            // Create group for zooming
            g = svg.append('g');

            // Setup zoom behavior
            zoom = d3.zoom()
                .scaleExtent([0.1, 5])
                .on('zoom', handleZoom);

            svg.call(zoom);

            // Draw everything
            drawTimelines();
            drawEvents();
            drawConnections();
            drawTimeLabels();
        }

        // Draw timeline lines
        function drawTimelines() {
            const lineHeight = g.selectAll('.timeline-line')
                .data(timelines)
                .join('path')
                .attr('class', 'timeline-line')
                .attr('d', d => `M 50 ${d.y} L ${canvasWidth - 50} ${d.y}`)
                .attr('stroke', d => d.color);

            // Add line labels
            g.selectAll('.line-label')
                .data(timelines)
                .join('text')
                .attr('class', 'line-label')
                .attr('x', 60)
                .attr('y', d => d.y - 10)
                .text(d => d.name);
        }

        // Draw events with clustering
        function drawEvents() {
            const clusterThreshold = 30 / currentZoom; // Pixels threshold for clustering
            
            // Group events by timeline and proximity
            const clusters = {};
            
            timelines.forEach(timeline => {
                const timelineEvents = events.filter(e => e.timelineId === timeline.id && !e.parentId);
                const sortedEvents = timelineEvents.sort((a, b) => a.time - b.time);
                
                clusters[timeline.id] = [];
                let currentCluster = [];
                
                sortedEvents.forEach((event, index) => {
                    if (currentCluster.length === 0) {
                        currentCluster.push(event);
                    } else {
                        const lastEvent = currentCluster[currentCluster.length - 1];
                        const xLast = getTimePosition(lastEvent.time);
                        const xCurrent = getTimePosition(event.time);
                        
                        if (xCurrent - xLast < clusterThreshold) {
                            currentCluster.push(event);
                        } else {
                            clusters[timeline.id].push(currentCluster);
                            currentCluster = [event];
                        }
                    }
                    
                    if (index === sortedEvents.length - 1) {
                        clusters[timeline.id].push(currentCluster);
                    }
                });
            });

            // Draw clusters or individual events
            Object.keys(clusters).forEach(timelineId => {
                const timeline = timelines.find(t => t.id == timelineId);
                
                clusters[timelineId].forEach(cluster => {
                    const x = getTimePosition(cluster[0].time);
                    const y = timeline.y;
                    
                    if (cluster.length === 1) {
                        // Single event
                        g.append('circle')
                            .attr('class', 'event-point')
                            .attr('cx', x)
                            .attr('cy', y)
                            .attr('r', 8)
                            .attr('fill', '#2ecc71')
                            .attr('stroke', '#27ae60')
                            .attr('stroke-width', 2)
                            .on('click', () => showEventDetails(cluster[0]));
                    } else {
                        // Cluster
                        g.append('circle')
                            .attr('class', 'cluster-circle')
                            .attr('cx', x)
                            .attr('cy', y)
                            .attr('r', 15)
                            .attr('fill', '#e74c3c');
                        
                        g.append('text')
                            .attr('class', 'event-cluster')
                            .attr('x', x)
                            .attr('y', y + 5)
                            .attr('text-anchor', 'middle')
                            .attr('fill', 'white')
                            .attr('font-size', '10px')
                            .text(cluster.length);
                        
                        // Make cluster clickable to show all events
                        g.append('circle')
                            .attr('cx', x)
                            .attr('cy', y)
                            .attr('r', 15)
                            .attr('fill', 'transparent')
                            .attr('cursor', 'pointer')
                            .on('click', () => showClusterDetails(cluster));
                    }
                });
            });
        }

        // Draw connections between parent and child events
        function drawConnections() {
            const childEvents = events.filter(e => e.parentId !== null);
            
            childEvents.forEach(child => {
                const parent = events.find(e => e.id === child.parentId);
                if (parent) {
                    const parentX = getTimePosition(parent.time);
                    const parentY = timelines.find(t => t.id === parent.timelineId).y;
                    const childX = getTimePosition(child.time);
                    const childY = parentY + 30; // Child events appear below the line
                    
                    g.append('line')
                        .attr('class', 'connection-line')
                        .attr('x1', parentX)
                        .attr('y1', parentY)
                        .attr('x2', childX)
                        .attr('y2', childY);
                    
                    // Draw child event
                    g.append('circle')
                        .attr('class', 'event-point')
                        .attr('cx', childX)
                        .attr('cy', childY)
                        .attr('r', 6)
                        .attr('fill', '#f39c12')
                        .attr('stroke', '#e67e22')
                        .attr('stroke-width', 2)
                        .on('click', () => showEventDetails(child));
                }
            });
        }

        // Draw time labels
        function drawTimeLabels() {
            const now = new Date();
            const timeRange = 86400000 * 30; // 30 days
            
            // Draw labels every 3 days
            for (let i = 0; i <= 10; i++) {
                const time = new Date(now.getTime() - (timeRange / 10) * i);
                const x = getTimePosition(time);
                
                g.append('text')
                    .attr('class', 'time-label')
                    .attr('x', x)
                    .attr('y', canvasHeight - 20)
                    .attr('text-anchor', 'middle')
                    .text(formatDate(time));
                
                // Grid line
                g.append('line')
                    .attr('x1', x)
                    .attr('y1', 50)
                    .attr('x2', x)
                    .attr('y2', canvasHeight - 40)
                    .attr('stroke', '#ecf0f1')
                    .attr('stroke-width', 1)
                    .attr('stroke-dasharray', '2,2');
            }
        }

        // Get X position for a given time
        function getTimePosition(time) {
            const now = new Date();
            const timeRange = 86400000 * 30; // 30 days
            const msDiff = now.getTime() - time.getTime();
            const ratio = msDiff / timeRange;
            return 50 + ratio * (canvasWidth - 100);
        }

        // Format date for display
        function formatDate(date) {
            return date.toLocaleDateString('ru-RU', {
                day: '2-digit',
                month: '2-digit',
                year: '2-digit'
            });
        }

        // Handle zoom
        function handleZoom(event) {
            g.attr('transform', event.transform);
            currentZoom = event.transform.k;
            updateZoomInfo();
            
            // Redraw events with updated clustering
            g.selectAll('.event-point, .cluster-circle, .event-cluster').remove();
            drawEvents();
        }

        // Reset zoom
        function resetZoom() {
            svg.transition().duration(750).call(
                zoom.transform,
                d3.zoomIdentity
            );
        }

        // Update canvas size
        function updateCanvasSize() {
            const newWidth = parseInt(document.getElementById('canvasWidth').value);
            const newHeight = parseInt(document.getElementById('canvasHeight').value);
            
            if (newWidth >= 600 && newWidth <= 3000 && newHeight >= 400 && newHeight <= 2000) {
                canvasWidth = newWidth;
                canvasHeight = newHeight;
                
                // Update timeline Y positions
                timelines.forEach((timeline, index) => {
                    timeline.y = 100 + index * (canvasHeight / timelines.length);
                });
                
                renderChart();
            } else {
                alert('Размеры должны быть в пределах: ширина 600-3000, высота 400-2000');
            }
        }

        // Add new timeline
        function addNewLine() {
            const newId = timelines.length;
            timelines.push({
                id: newId,
                name: `Линия ${newId + 1}`,
                y: 100 + newId * 100,
                color: colors[newId % colors.length]
            });
            
            // Adjust canvas height if needed
            if (timelines.length * 100 > canvasHeight - 100) {
                canvasHeight = timelines.length * 100 + 100;
                document.getElementById('canvasHeight').value = canvasHeight;
            }
            
            renderChart();
        }

        // Add random event
        function addRandomEvent() {
            if (timelines.length === 0) return;
            
            const now = new Date();
            const timeOffset = Math.random() * 86400000 * 30;
            const eventTime = new Date(now.getTime() - timeOffset);
            const timelineId = Math.floor(Math.random() * timelines.length);
            
            // 30% chance to attach to existing event
            let parentId = null;
            if (Math.random() < 0.3 && events.length > 0) {
                const randomParent = events[Math.floor(Math.random() * events.length)];
                parentId = randomParent.id;
            }
            
            events.push({
                id: eventIdCounter++,
                timelineId: timelineId,
                parentId: parentId,
                time: eventTime,
                title: `Новое событие ${eventIdCounter}`,
                description: `Событие создано ${new Date().toLocaleString('ru-RU')}`,
                data: {
                    type: ['Тип A', 'Тип B', 'Тип C'][Math.floor(Math.random() * 3)],
                    priority: ['Низкий', 'Средний', 'Высокий'][Math.floor(Math.random() * 3)],
                    status: 'Активно',
                    value: Math.floor(Math.random() * 1000),
                    category: `Категория ${Math.floor(Math.random() * 5) + 1}`
                }
            });
            
            renderChart();
        }

        // Show event details in modal
        function showEventDetails(event) {
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = event.title;
            
            let childEvents = events.filter(e => e.parentId === event.id);
            let childrenHTML = '';
            
            if (childEvents.length > 0) {
                childrenHTML = `
                    <div class="event-tree">
                        <h4>Дочерние события (${childEvents.length}):</h4>
                        ${childEvents.map(child => `
                            <div class="tree-item">${child.title}</div>
                        `).join('')}
                    </div>
                `;
            }
            
            body.innerHTML = `
                <div class="data-card">
                    <h3>Основная информация</h3>
                    <div class="data-row">
                        <span class="data-label">Время:</span>
                        <span class="data-value">${event.time.toLocaleString('ru-RU')}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Описание:</span>
                        <span class="data-value">${event.description}</span>
                    </div>
                    <div class="data-row">
                        <span class="data-label">Линия:</span>
                        <span class="data-value">${timelines.find(t => t.id === event.timelineId)?.name}</span>
                    </div>
                </div>
                
                <div class="data-card">
                    <h3>Данные объекта</h3>
                    ${Object.entries(event.data).map(([key, value]) => `
                        <div class="data-row">
                            <span class="data-label">${key}:</span>
                            <span class="data-value">${value}</span>
                        </div>
                    `).join('')}
                </div>
                
                ${childrenHTML}
            `;
            
            modal.classList.add('active');
        }

        // Show cluster details in modal
        function showClusterDetails(cluster) {
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');
            
            title.textContent = `Кластер событий (${cluster.length})`;
            
            body.innerHTML = `
                <div class="data-card">
                    <h3>События в кластере</h3>
                    ${cluster.map((event, index) => `
                        <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e9ecef;">
                            <div class="data-row">
                                <span class="data-label"><strong>${index + 1}. ${event.title}</strong></span>
                                <span class="data-value">${formatDate(event.time)}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Время:</span>
                                <span class="data-value">${event.time.toLocaleString('ru-RU')}</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">Описание:</span>
                                <span class="data-value">${event.description}</span>
                            </div>
                            <button class="btn btn-primary" style="margin-top: 10px; font-size: 12px; padding: 5px 10px;" 
                                    onclick="showEventDetails(events.find(e => e.id === ${event.id}))">
                                Подробнее
                            </button>
                        </div>
                    `).join('')}
                </div>
            `;
            
            modal.classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Update zoom info display
        function updateZoomInfo() {
            const zoomPercent = Math.round(currentZoom * 100);
            document.getElementById('zoomInfo').textContent = 
                `Масштаб: ${zoomPercent}% | Событий: ${events.length} | Линий: ${timelines.length}`;
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize on load
        window.addEventListener('load', init);
    </script>
</body>
</html>
