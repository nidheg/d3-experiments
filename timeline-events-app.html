<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline Events Diagram</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="timeline-events-app.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Timeline Events Diagram</h1>
            <div class="controls">
                <button class="btn btn-primary" onclick="addNewLine()">+ Добавить линию</button>
                <button class="btn btn-success" onclick="addRandomEvent()">+ Добавить событие</button>
                <button class="btn btn-primary" onclick="addEventTree()">+ Добавить дерево событий</button>
                <button class="btn" onclick="resetZoom()">Сбросить зум</button>
                <div class="size-controls">
                    <label>Ширина:</label>
                    <input type="number" id="canvasWidth" value="1600" min="600" max="3000" step="100">
                    <button class="btn btn-primary" onclick="updateCanvasSize()">Применить</button>
                </div>
                <div class="size-controls">
                    <label>Высота:</label>
                    <input type="number" id="canvasHeight" value="800" min="400" max="2000" step="50">
                    <button class="btn btn-primary" onclick="updateCanvasSize()">Применить</button>
                </div>
            </div>
        </div>

        <div class="chart-container">
            <svg id="chart"></svg>
        </div>

        <div style="padding: 0 30px 20px;">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: #3498db;"></div>
                    <span>Линия времени</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #2ecc71;"></div>
                    <span>Событие</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #e74c3c;"></div>
                    <span>Кластер событий</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: #95a5a6;"></div>
                    <span>Связь событий</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Детали события</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content will be dynamically inserted -->
            </div>
        </div>
    </div>

    <div class="zoom-info" id="zoomInfo">
        Масштаб: 100% | Событий: 0
    </div>

    <script src="timeline-events-app.js"></script>
</body>
</html>
