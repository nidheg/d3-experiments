<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Диаграмма</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .chart-container {
            width: 100%;
            overflow-x: auto;
        }

        .bar {
            transition: opacity 0.3s ease;
            cursor: pointer;
        }

        .bar:hover {
            opacity: 0.8;
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5568d3;
        }

        .axis-label {
            font-size: 12px;
            fill: #666;
        }

        .grid line {
            stroke: #e0e0e0;
            stroke-opacity: 0.7;
            shape-rendering: crispEdges;
        }

        .grid path {
            stroke-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Интерактивная D3.js Диаграмма</h1>
        <p class="subtitle">Наведите на столбцы для просмотра деталей</p>
        
        <div class="chart-container">
            <svg id="chart"></svg>
        </div>
        
        <div class="controls">
            <button onclick="updateData()">Обновить данные</button>
            <button onclick="toggleAnimation()">Переключить анимацию</button>
            <button onclick="changeChartType()">Сменить тип</button>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // Исходные данные
        let data = [
            { label: 'Янв', value: 45 },
            { label: 'Фев', value: 52 },
            { label: 'Мар', value: 38 },
            { label: 'Апр', value: 65 },
            { label: 'Май', value: 48 },
            { label: 'Июн', value: 59 },
            { label: 'Июл', value: 72 },
            { label: 'Авг', value: 61 },
            { label: 'Сен', value: 54 },
            { label: 'Окт', value: 68 },
            { label: 'Ноя', value: 43 },
            { label: 'Дек', value: 78 }
        ];

        let useAnimation = true;
        let chartType = 'bar'; // 'bar' или 'line'

        // Размеры диаграммы
        const margin = { top: 40, right: 30, bottom: 50, left: 60 };
        const width = 700 - margin.left - margin.right;
        const height = 400 - margin.top - margin.bottom;

        // Создание SVG
        const svg = d3.select('#chart')
            .attr('width', width + margin.left + margin.right)
            .attr('height', height + margin.top + margin.bottom)
            .append('g')
            .attr('transform', `translate(${margin.left},${margin.top})`);

        // Tooltip
        const tooltip = d3.select('#tooltip');

        // Шкалы
        let xScale = d3.scaleBand()
            .range([0, width])
            .padding(0.3);

        let yScale = d3.scaleLinear()
            .range([height, 0]);

        // Цветовая шкала
        const colorScale = d3.scaleSequential(d3.interpolateBlues)
            .domain([0, 100]);

        // Функция отрисовки сетки
        function drawGrid() {
            svg.append('g')
                .attr('class', 'grid')
                .attr('transform', `translate(0,${height})`)
                .call(d3.axisBottom(xScale).tickSize(-height).tickFormat(''));
            
            svg.append('g')
                .attr('class', 'grid')
                .call(d3.axisLeft(yScale).tickSize(-width).tickFormat(''));
        }

        // Функция отрисовки диаграммы
        function drawChart() {
            svg.selectAll('*').remove();
            
            // Обновление шкал
            if (chartType === 'bar') {
                xScale.domain(data.map(d => d.label));
            } else {
                xScale = d3.scalePoint()
                    .domain(data.map(d => d.label))
                    .range([0, width]);
            }
            
            yScale.domain([0, d3.max(data, d => d.value) * 1.1]);

            // Добавление осей
            svg.append('g')
                .attr('transform', `translate(0,${height})`)
                .call(d3.axisBottom(xScale))
                .selectAll('text')
                .attr('class', 'axis-label')
                .style('text-anchor', 'end')
                .attr('dx', '-.8em')
                .attr('dy', '.15em')
                .attr('transform', 'rotate(-45)');

            svg.append('g')
                .call(d3.axisLeft(yScale))
                .selectAll('text')
                .attr('class', 'axis-label');

            // Подписи осей
            svg.append('text')
                .attr('class', 'axis-label')
                .attr('text-anchor', 'middle')
                .attr('x', width / 2)
                .attr('y', height + 45)
                .text('Месяц');

            svg.append('text')
                .attr('class', 'axis-label')
                .attr('text-anchor', 'middle')
                .attr('transform', 'rotate(-90)')
                .attr('y', -45)
                .attr('x', -height / 2)
                .text('Значение');

            // Отрисовка в зависимости от типа диаграммы
            if (chartType === 'bar') {
                drawBarChart();
            } else {
                drawLineChart();
            }
        }

        // Столбчатая диаграмма
        function drawBarChart() {
            const bars = svg.selectAll('.bar')
                .data(data)
                .enter()
                .append('rect')
                .attr('class', 'bar')
                .attr('x', d => xScale(d.label))
                .attr('width', xScale.bandwidth())
                .attr('fill', d => colorScale(d.value))
                .on('mouseover', function(event, d) {
                    tooltip.style('opacity', 1)
                        .html(`<strong>${d.label}</strong><br>Значение: ${d.value}`)
                        .style('left', (event.pageX + 10) + 'px')
                        .style('top', (event.pageY - 30) + 'px');
                })
                .on('mousemove', function(event) {
                    tooltip.style('left', (event.pageX + 10) + 'px')
                        .style('top', (event.pageY - 30) + 'px');
                })
                .on('mouseout', function() {
                    tooltip.style('opacity', 0);
                });

            if (useAnimation) {
                bars.attr('y', height)
                    .attr('height', 0)
                    .transition()
                    .duration(800)
                    .delay((d, i) => i * 50)
                    .attr('y', d => yScale(d.value))
                    .attr('height', d => height - yScale(d.value));
            } else {
                bars.attr('y', d => yScale(d.value))
                    .attr('height', d => height - yScale(d.value));
            }
        }

        // Линейная диаграмма
        function drawLineChart() {
            const line = d3.line()
                .x(d => xScale(d.label))
                .y(d => yScale(d.value))
                .curve(d3.curveMonotoneX);

            // Градиент под линией
            const gradient = svg.append('defs')
                .append('linearGradient')
                .attr('id', 'area-gradient')
                .attr('x1', '0%')
                .attr('y1', '0%')
                .attr('x2', '0%')
                .attr('y2', '100%');
            
            gradient.append('stop')
                .attr('offset', '0%')
                .attr('stop-color', '#667eea')
                .attr('stop-opacity', 0.3);
            
            gradient.append('stop')
                .attr('offset', '100%')
                .attr('stop-color', '#667eea')
                .attr('stop-opacity', 0);

            // Область под линией
            const area = d3.area()
                .x(d => xScale(d.label))
                .y0(height)
                .y1(d => yScale(d.value))
                .curve(d3.curveMonotoneX);

            svg.append('path')
                .datum(data)
                .attr('fill', 'url(#area-gradient)')
                .attr('d', area);

            // Линия
            svg.append('path')
                .datum(data)
                .attr('fill', 'none')
                .attr('stroke', '#667eea')
                .attr('stroke-width', 3)
                .attr('d', line);

            // Точки на линии
            svg.selectAll('.dot')
                .data(data)
                .enter()
                .append('circle')
                .attr('class', 'dot')
                .attr('cx', d => xScale(d.label))
                .attr('cy', d => yScale(d.value))
                .attr('r', 6)
                .attr('fill', '#667eea')
                .attr('stroke', 'white')
                .attr('stroke-width', 2)
                .on('mouseover', function(event, d) {
                    tooltip.style('opacity', 1)
                        .html(`<strong>${d.label}</strong><br>Значение: ${d.value}`)
                        .style('left', (event.pageX + 10) + 'px')
                        .style('top', (event.pageY - 30) + 'px');
                })
                .on('mousemove', function(event) {
                    tooltip.style('left', (event.pageX + 10) + 'px')
                        .style('top', (event.pageY - 30) + 'px');
                })
                .on('mouseout', function() {
                    tooltip.style('opacity', 0);
                });
        }

        // Обновление данных
        function updateData() {
            data = data.map(d => ({
                label: d.label,
                value: Math.floor(Math.random() * 80) + 20
            }));
            drawChart();
        }

        // Переключение анимации
        function toggleAnimation() {
            useAnimation = !useAnimation;
            drawChart();
        }

        // Смена типа диаграммы
        function changeChartType() {
            chartType = chartType === 'bar' ? 'line' : 'bar';
            drawChart();
        }

        // Инициализация
        drawChart();
    </script>
</body>
</html>
